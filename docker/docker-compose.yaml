services:
  api:
    build:
      context: ../honcho
      dockerfile: Dockerfile
    entrypoint: ["sh", "docker/entrypoint.sh"]
    restart: unless-stopped
    ports:
      - "8101:8000"
    environment:
      - PORT=8000
      - DB_CONNECTION_URI=${DB_CONNECTION_URI:-postgresql+psycopg://postgres:${POSTGRES_PASSWORD:-honcho_secret}@database:5432/postgres}
      - CACHE_URL=redis://redis:6379/0?suppress=true
      - CACHE_ENABLED=true
      - LLM_GEMINI_API_KEY=${LLM_GEMINI_API_KEY:-}
      - LLM_ANTHROPIC_API_KEY=${LLM_ANTHROPIC_API_KEY:-}
      - LLM_OPENAI_API_KEY=${LLM_OPENAI_API_KEY:-}
      - AUTH_USE_AUTH=${AUTH_USE_AUTH:-false}
      - AUTH_JWT_SECRET=${AUTH_JWT_SECRET:-}
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  deriver:
    build:
      context: ../honcho
      dockerfile: Dockerfile
    entrypoint: ["/app/.venv/bin/python", "-m", "src.deriver"]
    restart: unless-stopped
    environment:
      - DB_CONNECTION_URI=${DB_CONNECTION_URI:-postgresql+psycopg://postgres:${POSTGRES_PASSWORD:-honcho_secret}@database:5432/postgres}
      - CACHE_URL=redis://redis:6379/0?suppress=true
      - CACHE_ENABLED=true
      - LLM_GEMINI_API_KEY=${LLM_GEMINI_API_KEY:-}
      - LLM_ANTHROPIC_API_KEY=${LLM_ANTHROPIC_API_KEY:-}
      - LLM_OPENAI_API_KEY=${LLM_OPENAI_API_KEY:-}
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy

  database:
    image: pgvector/pgvector:pg15
    restart: unless-stopped
    volumes:
      - honcho-db-data:/var/lib/postgresql/data
    command: ["postgres", "-c", "max_connections=200"]
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-honcho_secret}
      - POSTGRES_DB=postgres
      - POSTGRES_USER=postgres
      - PGDATA=/var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - honcho-redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  honcho-db-data:
  honcho-redis-data:
services:
  api:
    image: ghcr.io/plastic-labs/honcho/honcho-api:latest
    restart: unless-stopped
    ports:
      - "8101:8101"
    environment:
      - PORT=8101
      - DB_CONNECTION_URI=${DB_CONNECTION_URI:-postgresql+psycopg://postgres:${POSTGRES_PASSWORD:-honcho_secret}@database:5432/postgres}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - LLM_GEMINI_API_KEY=${LLM_GEMINI_API_KEY:-}
      - LLM_ANTHROPIC_API_KEY=${LLM_ANTHROPIC_API_KEY:-}
      - LLM_OPENAI_API_KEY=${LLM_OPENAI_API_KEY:-}
      - AUTH_USE_AUTH=${AUTH_USE_AUTH:-false}
      - AUTH_JWT_SECRET=${AUTH_JWT_SECRET:-}
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8101/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  deriver:
    image: ghcr.io/plastic-labs/honcho/honcho-deriver:latest
    restart: unless-stopped
    environment:
      - DB_CONNECTION_URI=${DB_CONNECTION_URI:-postgresql+psycopg://postgres:${POSTGRES_PASSWORD:-honcho_secret}@database:5432/postgres}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - LLM_GEMINI_API_KEY=${LLM_GEMINI_API_KEY:-}
      - LLM_ANTHROPIC_API_KEY=${LLM_ANTHROPIC_API_KEY:-}
      - LLM_OPENAI_API_KEY=${LLM_OPENAI_API_KEY:-}
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_started

  database:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    volumes:
      - honcho-db-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-honcho_secret}
      - POSTGRES_DB=postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - honcho-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  honcho-db-data:
  honcho-redis-data:
